<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mobile Preview</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            margin: 0;
        }
        /* Simulated Smartphone Frame */
        .phone-frame {
            width: 375px;
            height: 812px;
            border: 12px solid #333;
            border-radius: 36px;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="phone-frame">
        <iframe src="index.html"></iframe>
    </div>

</body>
</html>
